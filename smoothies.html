<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./images/favicon.png" />
    <title>Smoothies · Hotel de Orashi</title>
    <meta
      name="description"
      content="Smoothies at Hotel de Orashi — Strawberry & Banana, Avocado & Banana, Pineapple & Banana."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="ivotel.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="page-hero">
        <img src="./images/cat-smoothies.jpg" alt="Smoothies" />
      </div>
      <div class="cat-page-header">
        <a class="page-back" href="drinks-menu.html">‹ Back</a>
        <p class="cat-page-title">
          <span class="cpt-line" aria-hidden="true"></span>
          <span class="cpt-text">Smoothies</span>
          <span class="cpt-line" aria-hidden="true"></span>
        </p>
      </div>

      <main>
        <div class="item-list">
          <div class="item-card"><span class="item-name">Strawberry and Banana Smoothie</span><span class="item-price">₦6,000</span></div>
          <div class="item-card"><span class="item-name">Avocado and Banana Smoothie</span><span class="item-price">₦6,000</span></div>
          <div class="item-card"><span class="item-name">Pineapple and Banana Smoothie</span><span class="item-price">₦6,000</span></div>
        </div>
      </main>

      <nav class="bottom-nav" aria-label="Primary">
        <a href="index.html#home" class="nav-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11.5L12 4l9 7.5v8.5a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8.5Z"/></svg>
          <span>Home</span>
        </a>
        <a href="food-menu.html" class="nav-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8h12"/><path d="M8 12h8"/><path d="M9 16h6"/><path d="M7 4h10a1 1 0 0 1 1 1v2a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a1 1 0 0 1 1-1Z"/><path d="M15 6v2"/><path d="M9 6v2"/></svg>
          <span>Food</span>
        </a>
        <a href="drinks-menu.html" class="nav-link active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4h8l-1 7a3 3 0 0 1-6 0L8 4Z"/><path d="M12 4v5"/><path d="M10 20h4"/><path d="M12 12v8"/></svg>
          <span>Drinks</span>
        </a>
        <a href="rooms.html" class="nav-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10h16v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V10Z"/><path d="M4 10L12 4l8 6"/><path d="M9 15h2"/><path d="M9 18h2"/><path d="M14 15h2"/><path d="M14 18h2"/></svg>
          <span>Rooms</span>
        </a>
        <a href="contact.html" class="nav-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.08 4.18 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.72c.12 1.03.34 2.03.65 3a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.08-1.08a2 2 0 0 1 2.11-.45c.97.31 1.97.53 3 .65a2 2 0 0 1 1.72 2Z"/></svg>
          <span>Contact</span>
        </a>
      </nav>
    </div>
    <script>
      document.querySelectorAll('.bottom-nav .nav-link').forEach(link => {
        link.addEventListener('click', event => {
          document.querySelectorAll('.bottom-nav .nav-link').forEach(item => item.classList.remove('active'));
          event.currentTarget.classList.add('active');
        });
      });
    </script>
  </body>
</html>
